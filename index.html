<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Practice1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Javascript Conditional Statements</h1>
    <! -- comment -->
    <input type="text" id="age" class="form-control">

    <button class="btn btn-info" onclick="checkAge()">Check</button>
    <script>
        function checkAge() {
            var age = document.getElementById("age").value;
        
            if (isNaN(age) || age < 0) {
            alert("please input your age");
        }
        else if(age < 18) {
            alert("you are of legal age.");
        }
        else if(age > 18) {
            alert("you are not of legal age.");
        }
    }
    </script>
</body>
</html>
